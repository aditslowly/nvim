#format = '$all'

#[localip]
#ssh_only = false
#format = 'рЯУЯ [$localipv4](bold red) '
#disabled = false
add_newline = false

format = """$directory$character"""
right_format = """$hostname$git_branch$git_status$all"""

[hostname]
ssh_only = false
format = 'on [$hostname](yellow) '
trim_at = "."
disabled = true

# Replace the "вЭѓ" symbol in the prompt with "вЮЬ"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[вЭѓ](bold green)"     # The "success_symbol" segment is being set to "вЮЬ" with the color "bold green"
error_symbol = "[вЭѓ](bold red)"
# пФґ пФі
# configure directory
[directory]
read_only = " оВҐ"
truncation_length = 1
truncate_to_repo = true # truncates directory to root folder if in github repo
style = "italic blue"

[git_status]
style = "purple"
disabled = false

#[cmd_duration]
#min_time = 4
#show_milliseconds = false
#disabled = false
#style = "bold red"

