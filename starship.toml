#format = """
#[тХнтФАuserтФАтФАтФАтЭп](bold blue) $username
#[тФгтФАsystemтФАтЭп](bold yellow) $hostname
#[тФгтФАprojectтЭп](bold red) $directory$rust$git_branch$git_status$package$golang$terraform$docker_context$python$docker_context$nodejs
#[тХ░тФАcmdтФАтФАтФАтФАтЭп](bold green) 
#"""
#format = '$all'

#[localip]
#ssh_only = false
#format = 'ЁЯУЯ [$localipv4](bold red) '
#disabled = false

[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = true
show_always = false

[hostname]
ssh_only = false
format = 'on [$hostname](bold yellow) '
trim_at = "."
disabled = true

# Replace the "тЭп" symbol in the prompt with "тЮЬ"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[ґ░ШН](bold green)"     # The "success_symbol" segment is being set to "тЮЬ" with the color "bold green"
error_symbol = "[тЬЧ](bold red)"
# яФ╢ яФ┤
# configure directory
[directory]
read_only = " юВв"
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
style = "italic blue"

#[cmd_duration]
#min_time = 4
#show_milliseconds = false
#disabled = false
#style = "bold red"

[aws]
symbol = "юМ╜  "
disabled = true

[conda]
symbol = "яДМ "
disabled = true

[dart]
symbol = "юЮШ "
disabled = true

[docker_context]
symbol = "яМИ "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = true

[elixir]
symbol = "юЙ╡ "
disabled = true

[elm]
